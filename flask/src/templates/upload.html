{% extends "base.html" %}

{% block title %}Upload - XPix{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Upload a Photo</h1>
                <p class="text-muted mb-4">Choose an image file to add to your profile.</p>

                <form method="POST" action="{{ url_for('upload_photo') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="photo" class="form-label">Image file</label>
                        <input
                            type="file"
                            class="form-control"
                            id="photo"
                            name="photo"
                            accept="image/*"
                            required
                        >
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Upload Photo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
